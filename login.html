{% extends "layout.html" %}

{% block body_class %}login-page{% endblock %}

{% block content %}
<h2>Login</h2>

<form method="post">
    <input type="text" name="username" placeholder="Username">
    <input type="password" name="password" placeholder="Password">
    <button type="submit">Login</button>
</form>

{% if error %}
    <p style="color: red;">{{ error }}</p>
{% endif %}
{% endblock %}
